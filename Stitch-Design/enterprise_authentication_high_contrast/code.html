<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>ProjectHQ - Authentication Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-container": "#737272",
              primary: "#ffb3ae",
              "on-primary": "#68000c",
              "error-container": "#93000a",
              error: "#ffb4ab",
              "surface-container": "#1f2020",
              "secondary-container": "#474747",
              "inverse-on-surface": "#303031",
              "tertiary-fixed-dim": "#c8c6c5",
              "on-tertiary-fixed-variant": "#474746",
              "surface-container-highest": "#343535",
              surface: "#121414",
              "on-error-container": "#ffdad6",
              background: "#121414",
              "primary-fixed": "#ffdad7",
              outline: "#ad8885",
              "surface-tint": "#ffb3ae",
              "surface-container-lowest": "#0d0e0f",
              "on-surface-variant": "#e6bdba",
              "on-tertiary-fixed": "#1c1b1b",
              "on-surface": "#e3e2e2",
              "inverse-primary": "#c0001f",
              "on-secondary-container": "#b5b5b5",
              "inverse-surface": "#e3e2e2",
              "tertiary-fixed": "#e5e2e1",
              "secondary-fixed-dim": "#c6c6c6",
              "on-secondary-fixed-variant": "#474747",
              "surface-container-high": "#292a2a",
              "on-primary-fixed-variant": "#930015",
              "primary-fixed-dim": "#ffb3ae",
              "secondary-fixed": "#e2e2e2",
              tertiary: "#c8c6c5",
              "on-tertiary": "#313030",
              "surface-variant": "#343535",
              "surface-container-low": "#1b1c1c",
              "on-primary-container": "#fff8f7",
              "on-primary-fixed": "#410004",
              "on-error": "#690005",
              "surface-bright": "#383939",
              secondary: "#c6c6c6",
              "on-secondary-fixed": "#1b1b1b",
              "surface-dim": "#121414",
              "on-tertiary-container": "#fbf8f7",
              "outline-variant": "#5d3f3d",
              "on-background": "#e3e2e2",
              "primary-container": "#e01e2e",
              "on-secondary": "#303030",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            spacing: {
              lg: "16px",
              "container-margin": "16px",
              xl: "24px",
              unit: "4px",
              xs: "4px",
              md: "12px",
              sm: "8px",
              gutter: "1px",
            },
            fontFamily: {
              h1: ["Inter"],
              h2: ["Inter"],
              "label-caps": ["Inter"],
              "meta-mono": ["JetBrains Mono"],
              "body-sm": ["Inter"],
              "body-lg": ["Inter"],
            },
            fontSize: {
              h1: [
                "24px",
                {
                  lineHeight: "32px",
                  letterSpacing: "-0.02em",
                  fontWeight: "600",
                },
              ],
              h2: [
                "18px",
                {
                  lineHeight: "24px",
                  letterSpacing: "-0.01em",
                  fontWeight: "600",
                },
              ],
              "label-caps": [
                "10px",
                {
                  lineHeight: "12px",
                  letterSpacing: "0.06em",
                  fontWeight: "700",
                },
              ],
              "meta-mono": [
                "11px",
                {
                  lineHeight: "16px",
                  letterSpacing: "0.02em",
                  fontWeight: "500",
                },
              ],
              "body-sm": ["13px", { lineHeight: "18px", fontWeight: "400" }],
              "body-lg": ["14px", { lineHeight: "20px", fontWeight: "400" }],
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #000000;
      } /* True black background as requested */
    </style>
  </head>
  <body
    class="font-body-lg relative flex min-h-screen items-center justify-center overflow-hidden text-white antialiased"
  >
    <!-- Subtle abstract background graphic for depth, very low opacity -->
    <div
      class="pointer-events-none absolute inset-0 bg-cover bg-center opacity-10 mix-blend-overlay"
      data-alt="A macro photograph of an abstract dark industrial surface, perhaps brushed metal or carbon fiber, rendered in extremely low key lighting. The scene is nearly pitch black, with only the faintest, surgical glints of deep crimson red light catching on edges or microscopic textures, emphasizing a highly secure, high-tech, and minimalist enterprise environment. The composition is stark and functional, with no decorative elements."
      style="
        background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuC22_jkgEdOUkWcb5-oSyKXlw9fJEC6IQac5xUt91cWn6X8yqMkqoSS7UmudDKD6NfzN9tWpWqbdogQQVThd8yUS__l4Q3aKg4NoSO_JPpC0S-o0iKJHOe_vonv7pnqIfKKW17AkECtFvCi2W9aXOT8PZvQV81-dnsFP1M40lbLFX--dWNcwg6lbgsaLsLdQht7LSBTpdSZ2MpYCsyzt7pdNZgPjave0aSxFr03Lkl8UDxeqWd8Slc_Dw&quot;);
      "
    ></div>
    <main class="px-container-margin z-10 w-full max-w-[400px]">
      <!-- Auth Card -->
      <div
        class="bg-surface border-outline-variant p-xl gap-xl flex flex-col rounded-lg border"
      >
        <!-- Header -->
        <div class="gap-sm flex flex-col items-center">
          <div
            class="font-h1 flex h-12 w-12 items-center justify-center rounded bg-[#e01e2e] tracking-tighter text-white shadow-[0_0_15px_rgba(224,30,46,0.3)]"
          >
            PHQ
          </div>
          <h1 class="font-h2 text-h2 mt-sm text-white">
            Authentication Portal
          </h1>
          <p class="font-body-sm text-body-sm text-center text-gray-400">
            Enter your workspace credentials to access the secure environment.
          </p>
        </div>
        <!-- Form -->
        <form class="gap-lg flex flex-col" onsubmit="event.preventDefault()">
          <div class="gap-xs flex flex-col">
            <label
              class="font-label-caps text-label-caps text-white uppercase"
              for="workspace-code"
              >Workspace Code</label
            >
            <div class="relative">
              <span
                class="material-symbols-outlined left-md pointer-events-none absolute top-1/2 -translate-y-1/2 text-base text-gray-400"
                >vpn_key</span
              >
              <input
                autocomplete="off"
                class="border-outline-variant font-meta-mono text-meta-mono pr-md py-md w-full rounded border bg-black pl-10 text-white caret-white transition-colors placeholder:text-gray-500 focus:border-[#e01e2e] focus:ring-1 focus:ring-[#e01e2e] focus:outline-none"
                id="workspace-code"
                placeholder="XXXX-XXXX-XXXX"
                spellcheck="false"
                type="text"
              />
            </div>
          </div>
          <div class="gap-md flex flex-col">
            <button
              class="font-h2 text-h2 py-md gap-sm flex w-full items-center justify-center rounded bg-[#e01e2e] text-white transition-colors hover:bg-[#c81a29]"
              type="submit"
            >
              Continue to HQ
              <span class="material-symbols-outlined text-[20px]"
                >arrow_forward</span
              >
            </button>
            <button
              class="border-outline-variant hover:bg-surface-container-lowest font-body-sm text-body-sm py-md w-full rounded border bg-black text-gray-300 transition-colors"
              type="button"
            >
              Request Access
            </button>
          </div>
        </form>
        <!-- Footer / Security Indicator -->
        <div
          class="mt-sm pt-md border-outline-variant gap-xs flex items-center justify-center border-t"
        >
          <div
            class="h-1.5 w-1.5 animate-pulse rounded-full bg-white opacity-80"
          ></div>
          <span
            class="font-meta-mono text-meta-mono tracking-wider text-gray-400 uppercase"
            >Secure Connection Established</span
          >
        </div>
      </div>
    </main>
    <!-- Global Footer (Suppressed active navigation logic as this is a transactional screen) -->
    <footer
      class="border-outline-variant bg-surface-container-lowest px-md font-meta-mono text-meta-mono fixed bottom-0 z-10 flex h-6 w-full cursor-default items-center justify-between border-t text-gray-400"
    >
      <div>v4.2.0-stable</div>
      <div class="gap-lg flex">
        <span class="transition-colors hover:text-white">System Health</span>
        <span class="transition-colors hover:text-white">Branch: main</span>
        <span class="transition-colors hover:text-white">Sync: OK</span>
      </div>
    </footer>
  </body>
</html>
